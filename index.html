---
layout: default
title: blog
# Note that this index page uses a full-width layout!
---

  <h1 class="content-listing-header sans">Articles</h1>

    {% for post in site.posts %}      
        
          <hr class="slender">
          <a href="{{ post.url | prepend: site.baseurl }}"><h1 class="contrast" style="margin-bottom: 0.5rem;" >{{ post.title }}</h1></a>
          <span class="smaller">{{ post.date | date: "%B %-d, %Y" }}</span>  
          {{post.content}}
        
    {% endfor %}
